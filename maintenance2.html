<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinTech | Site Under Maintenance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700;800&display=swap');

        :root {
            --brand-yellow: #facc15;
            --dark-bg: #0a0a0a;
            --charcoal: #1a1a1a;
            --text-white: #ffffff;
            --text-gray: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(250, 204, 21, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(250, 204, 21, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(250, 204, 21, 0.05) 0%, transparent 70%);
            z-index: 2;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 600px;
            padding: 2rem;
            perspective: 1000px;
        }

        /* Gear Logo Icon */
        .logo-wrapper {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 0.8s forwards;
        }

        .brand-logo {
            width: 80px;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            animation: fadeIn 1s ease-out forwards;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .wintech-name {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-white);
            line-height: 1;
            letter-spacing: -0.02em;
        }

        .wintech-name span { color: var(--brand-yellow); }

        .rental-tagline {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--brand-yellow);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-top: 0.25rem;
            opacity: 0.8;
        }

        .content {
            background: var(--charcoal);
            padding: 3rem;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s 0.2s forwards;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--text-white);
        }

        p {
            color: var(--text-gray);
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .contact-box {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: var(--brand-yellow);
            color: var(--dark-bg);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(250, 204, 21, 0.2);
        }

        .btn-outline {
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-white);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .footer-note {
            margin-top: 3rem;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0;
            animation: fadeIn 1s 1s forwards;
        }

        @keyframes fadeInDown {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @media (max-width: 640px) {
            body {
                height: auto;
                min-height: 100vh;
                padding: 2rem 0;
                overflow-y: auto;
            }
            .container {
                padding: 1.25rem;
            }
            .logo-wrapper {
                flex-direction: column;
                gap: 0.5rem;
            }
            .logo-text {
                text-align: center;
            }
            .wintech-name { 
                font-size: 2.25rem; 
            }
            .rental-tagline {
                font-size: 0.9rem;
                letter-spacing: 0.15em;
            }
            .content { 
                padding: 2rem 1.5rem; 
                border-radius: 1.5rem;
            }
            h1 {
                font-size: 1.75rem;
            }
            p {
                font-size: 0.95rem;
                margin-bottom: 2rem;
            }
            .contact-box { 
                gap: 0.75rem;
            }
            .btn {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="glow"></div>

    <div class="container" id="parallax-card">
        <div class="logo-wrapper">
            <img src="assets/wintech-logo.png" alt="WinTech Logo" class="brand-logo">
            <div class="logo-text">
                <span class="wintech-name"><span>WIN</span>TECH</span>
                <span class="rental-tagline">Equipment Rental</span>
            </div>
        </div>

        <div class="content">
            <h1>Coming Soon</h1>
            <p>Our offshore equipment rental platform is currently undergoing maintenance. We're getting ready to provide you with an even better experience.</p>
            
            <div class="contact-box">
                <a href="https://wa.me/971545751720?text=Hello%20WinTech%2C%20I%20am%20interested%20in%20your%20services.%20Can%20you%20help%3F" class="btn btn-primary">
                    Contact on WhatsApp
                </a>
                <a href="mailto:wintech.rental@gmail.com" class="btn btn-outline">
                    Send us an Email
                </a>
            </div>
        </div>

        <div class="footer-note">
            &copy; 2024 WinTech Equipment Rental. All rights reserved.
        </div>
    </div>

    <script>
        const card = document.getElementById('parallax-card');
        document.addEventListener('mousemove', (e) => {
            const glow = document.querySelector('.glow');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            glow.style.transform = `translate(-${50 + (x * 5)}%, -${50 + (y * 5)}%)`;

            // Parallax effect on card
            const rotateX = (window.innerHeight / 2 - e.clientY) / 40;
            const rotateY = (e.clientX - window.innerWidth / 2) / 40;
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
    </script>
</body>
</html>
